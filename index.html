<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভিডিও আনলক করুন</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 420px;
            width: 100%;
            overflow: hidden;
            text-align: center;
            color: #1e293b;
        }

        /* Thumbnail styling with Play Button overlay */
        .thumbnail-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            overflow: hidden;
        }

        .thumbnail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(239, 68, 68, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
        }

        .play-icon::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 0 10px 18px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 4px;
        }

        .badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
        }

        .content {
            padding: 24px 20px;
        }

        .caption {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .instruction {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            background: #3b82f6;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn:hover:not(:disabled) {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #cbd5e1;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        .btn-completed {
            background: #10b981 !important;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3) !important;
        }

        .btn-main {
            background: #ef4444;
            font-size: 16px;
            margin-top: 15px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .btn-main:hover:not(:disabled) {
            background: #dc2626;
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 15px 0;
        }

        .tracker-container {
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- ভিডিও থাম্বনেল -->
    <div class="thumbnail-container">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjlOQ8azXiY6lnutxJnedmnYAyICT_F4T8LXxZ7BIdPf9hgHmXu3iVue-HmoyrSx8TUIAb8ghyphenhyphenc70doILJxLtA3NADOvicLVuB4v_3y2XgVtFy2AjqHYjb6swG1aPpP35RW1ClXUtZC9A4LcUK5erpML2sLezXBsufG4zppNJnP2BKdXPX2RCfTwDdFpGDU/s3264/20260722_014352.jpg" alt="Video Thumbnail" class="thumbnail-img">
        <div class="play-icon"></div>
        <div class="badge">24:00</div>
    </div>

    <div class="content">
        <!-- ভিডিও ক্যাপশন -->
        <h1 class="caption">ম্যাডাম ও পিচ্চি ছাত্রের ২৪ মিনিটের ভাইরাল ভিডিও</h1>
        
        <div class="instruction">
            🔓 ভিডিও আনলক করতে দুইটি এড দেখুন
        </div>

        <!-- এড বাটনসমূহ -->
        <button id="ad1Btn" class="btn" onclick="startAd(1, 'https://omg10.com/4/11194601')">
            প্রথম এড দেখুন
        </button>
        
        <button id="ad2Btn" class="btn" onclick="startAd(2, 'https://omg10.com/4/11371244')">
            দ্বিতীয় এড দেখুন
        </button>

        <div class="divider"></div>

        <!-- মূল ভিডিও আনলক বাটন -->
        <button id="mainBtn" class="btn btn-main" disabled onclick="openMainLink()">
            🔒 ফুল ভিডিও দেখুন (লক করা)
        </button>

        <!-- ট্রাফিক ট্র্যাকার -->
        <div class="tracker-container">
            <div align=center><a href='https://www.counter12.com'><img src='https://www.counter12.com/img-B6ZBbDDAz9A8Y3bd-38.gif' border='0' alt='conter12'></a><script type='text/javascript' src='https://www.counter12.com/ad.js?id=B6ZBbDDAz9A8Y3bd'></script></div>
        </div>
    </div>
</div>

<script>
    let ad1Completed = false;
    let ad2Completed = false;

    function startAd(adNumber, url) {
        // নতুন ট্যাবে এড ওপেন হবে
        window.open(url, '_blank');

        const btn = document.getElementById(`ad${adNumber}Btn`);
        btn.disabled = true;

        let timeLeft = 10;
        btn.innerText = `অপেক্ষা করুন (${timeLeft} সেকেন্ড)`;

        const timer = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                btn.innerText = `অপেক্ষা করুন (${timeLeft} সেকেন্ড)`;
            } else {
                clearInterval(timer);
                btn.innerText = `✓ এড ${adNumber} দেখা সম্পন্ন`;
                btn.classList.add('btn-completed');

                if (adNumber === 1) ad1Completed = true;
                if (adNumber === 2) ad2Completed = true;

                checkUnlockStatus();
            }
        }, 1000);
    }

    function checkUnlockStatus() {
        if (ad1Completed && ad2Completed) {
            const mainBtn = document.getElementById('mainBtn');
            mainBtn.disabled = false;
            mainBtn.innerText = '▶ এখনই প্লে করুন';
        }
    }

    function openMainLink() {
        window.location.href = 'https://kamrul7333.github.io/-/';
    }
</script>

</body>
</html>
